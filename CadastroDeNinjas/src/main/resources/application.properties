spring.application.name=CadastroDeNinjas


# Configuração do H2
# DB_CLOSE_ON_EXIT = FALSE -> quando fechar o banco de dados/termninar a aplicação, não fechar o banco de dados, continue rodando
# DB_CLOSE_DELAY=-1;DB -> Quando fechar o banco de dados, não apagar os dados, irá ficar os dados até apagar a tabela.
spring.datasource.url=${DATABASE_URL}
spring.datasource.driver=org.h2.Driver
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

#Configurações do JPA // HIBERNATES
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.h2.console.enabled=true